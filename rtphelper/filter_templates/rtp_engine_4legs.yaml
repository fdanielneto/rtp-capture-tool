# RTP Engine Filter Template (4 Legs)
# ==================================================
# Filter template for RTP Engine topology (3-hop)
# RTP Engine media proxy between carrier and core
#
# Topology:
#   Carrier ←→ RTP Engine ←→ Core
#
# Filters:
#   - Step 1: Carrier → RTP Engine (carrier side RTP)
#   - Step 2: RTP Engine → Carrier (carrier side RTP return)
#   - Step 3: RTP Engine → Core (core side RTP)
#   - Step 4: Core → RTP Engine (core side RTP return)
# ==================================================

name: rtp_engine_4legs
description: "4-leg filter template for RTP Engine topology"
version: "1.0.0"
topology: rtp_engine_topology
legs: 4

# Filter Steps
# --------------------------------------------------
# Each step defines a tshark filter for one RTP leg
steps:
  - step: 1
    leg_name: "carrier->host"
    leg_key: "leg_carrier_rtpengine"
    description: "RTP from carrier to RTP Engine"
    
    # Phase 1 template (before XCC re-INVITE)
    phase1_template: |
      {% if direction == "outbound" %}ip.dst==${carrier.destination.ip} && udp.srcport==${carrier.source.port}{% else %}ip.src==${carrier.source.ip} && udp.srcport==${carrier.source.port}{% endif %}
    
    # Phase 2 template (after XCC re-INVITE)
    phase2_template: |
      {% if direction == "outbound" %}ip.src==${carrier.destination.ip} && udp.srcport==${carrier.destination.port}{% else %}ip.src==${carrier.source.ip} && udp.srcport==${carrier.source.port}{% endif %}
    
    # Required fields for this filter
    required_fields:
      - carrier.source.ip
      - carrier.source.port
    
    # Field descriptions
    field_descriptions:
      carrier.source.ip: "Carrier RTP source IP"
      carrier.source.port: "Carrier RTP source port"
      carrier.destination.ip: "Carrier RTP destination IP (RTP Engine)"
      carrier.destination.port: "Carrier RTP destination port (RTP Engine)"
    
    # Notes
    notes: |
      Captures RTP packets from carrier to RTP Engine (carrier side).
      
      Filter logic:
      - Inbound: Source IP = carrier, source port = carrier RTP port
      - Outbound: Destination IP = carrier, source port = carrier RTP port
      - Direction: Carrier → RTP Engine
      
      Phase handling:
      - Phase 1: Before XCC cross-connect
      - Phase 2: After XCC cross-connect (endpoints finalized)

  - step: 2
    leg_name: "host->carrier"
    leg_key: "leg_rtpengine_carrier"
    description: "RTP from RTP Engine to carrier"
    
    # Phase 1 template (before XCC re-INVITE)
    phase1_template: |
      {% if direction == "outbound" %}udp.srcport==${carrier.destination.port} && ip.src==${carrier.destination.ip}{% else %}udp.srcport==${carrier.destination.port} && ip.dst==${carrier.source.ip}{% endif %}
    
    # Phase 2 template (after XCC re-INVITE)
    phase2_template: |
      {% if direction == "outbound" %}ip.src==${carrier.rtpengine_ip} && udp.srcport==${carrier.source.port}{% else %}ip.src==${carrier.rtpengine_ip} && udp.srcport==${carrier.destination.port}{% endif %}
    
    # Required fields for this filter
    required_fields:
      - carrier.destination.port
    
    # Field descriptions
    field_descriptions:
      carrier.destination.port: "RTP Engine port (carrier side)"
      carrier.rtpengine_ip: "RTP Engine IP (detected via SDP)"
    
    # Notes
    notes: |
      Captures RTP packets from RTP Engine to carrier (carrier side return).
      
      Filter logic:
      - Source port = RTP Engine carrier-side port
      - Source IP = RTP Engine IP (in phase 2)
      - Direction: RTP Engine → Carrier
      
      Phase handling:
      - Phase 1: Before XCC (uses destination port)
      - Phase 2: After XCC (uses RTP Engine IP)

  - step: 3
    leg_name: "host->core"
    leg_key: "leg_rtpengine_core"
    description: "RTP from RTP Engine to core"
    
    # Phase 1 template (before XCC re-INVITE)
    phase1_template: |
      {% if direction == "outbound" %}udp.srcport==${core.source.port} && ip.src==${core.source.ip}{% else %}udp.srcport==${core.source.port} && ip.dst==${core.destination.ip}{% endif %}
    
    # Phase 2 template (after XCC re-INVITE)
    phase2_template: |
      {% if direction == "outbound" %}ip.src==${core.rtpengine_ip} && udp.srcport==${core.destination.port}{% else %}ip.src==${core.rtpengine_ip} && udp.srcport==${core.source.port}{% endif %}
    
    # Required fields for this filter
    required_fields:
      - core.source.port
    
    # Field descriptions
    field_descriptions:
      core.source.port: "RTP Engine port (core side)"
      core.rtpengine_ip: "RTP Engine IP (detected via SDP)"
    
    # Notes
    notes: |
      Captures RTP packets from RTP Engine to core (core side).
      
      Filter logic:
      - Source port = RTP Engine core-side port
      - Source IP = RTP Engine IP (in phase 2)
      - Direction: RTP Engine → Core
      
      Phase handling:
      - Phase 1: Before XCC (uses source port)
      - Phase 2: After XCC (uses RTP Engine IP and destination port)

  - step: 4
    leg_name: "core->host"
    leg_key: "leg_core_rtpengine"
    description: "RTP from core to RTP Engine"
    
    # Phase 1 template (before XCC re-INVITE)
    phase1_template: |
      {% if direction == "outbound" %}ip.dst==${core.source.ip} && udp.srcport==${core.destination.port}{% else %}ip.src==${core.destination.ip} && udp.srcport==${core.destination.port}{% endif %}
    
    # Phase 2 template (after XCC re-INVITE)
    phase2_template: |
      {% if direction == "outbound" %}ip.src==${core.source.ip} && udp.srcport==${core.source.port}{% else %}ip.src==${core.destination.ip} && udp.srcport==${core.destination.port}{% endif %}
    
    # Required fields for this filter
    required_fields:
      - core.destination.ip
      - core.destination.port
    
    # Field descriptions
    field_descriptions:
      core.destination.ip: "Core RTP destination IP"
      core.destination.port: "Core RTP destination port"
      core.source.ip: "Core RTP source IP (outbound)"
      core.source.port: "Core RTP source port (outbound)"
    
    # Notes
    notes: |
      Captures RTP packets from core to RTP Engine (core side return).
      
      Filter logic:
      - Inbound: Source IP = core, source port = core RTP port
      - Outbound: Destination IP = core, source port = core RTP port
      - Direction: Core → RTP Engine
      
      Phase handling:
      - Phase 1: Before XCC cross-connect
      - Phase 2: After XCC cross-connect (endpoints finalized)

# Overall Template Metadata
# --------------------------------------------------
metadata:
  total_legs: 4
  topology_type: rtp_engine_media_proxy
  media_path: "Carrier ←→ RTP Engine ←→ Core"
  
  phases:
    - phase: 1
      name: "Carrier ←→ RTP Engine"
      description: "First hop: carrier media through RTP Engine"
      legs: [1, 2]
    
    - phase: 2
      name: "RTP Engine ←→ Core"
      description: "Second hop: RTP Engine media to core"
      legs: [3, 4]

# Required Fields Summary
# --------------------------------------------------
required_fields_summary:
  - carrier.source.ip
  - carrier.source.port
  - carrier.destination.port
  - core.source.port
  - core.destination.ip
  - core.destination.port

# Optional Fields (used in phase 2)
# --------------------------------------------------
optional_fields:
  - carrier.rtpengine_ip
  - core.rtpengine_ip
  - carrier.destination.ip
  - core.source.ip

# Field Extraction Sources
# --------------------------------------------------
field_sources:
  carrier.source.ip: "From carrier RTP endpoint in SIP response SDP"
  carrier.source.port: "From carrier RTP endpoint in SIP response SDP"
  carrier.destination.ip: "From RTP Engine carrier-side endpoint (phase 1)"
  carrier.destination.port: "From RTP Engine carrier-side endpoint"
  carrier.rtpengine_ip: "Detected via SDP c= line changes"
  core.source.ip: "From core RTP endpoint in SIP response SDP (outbound)"
  core.source.port: "From RTP Engine core-side endpoint"
  core.destination.ip: "From core RTP endpoint in SIP response SDP"
  core.destination.port: "From core RTP endpoint in SIP response SDP"
  core.rtpengine_ip: "Detected via SDP c= line changes (same as carrier.rtpengine_ip)"

# Validation Rules
# --------------------------------------------------
validation:
  minimum_fields_required: 6
  required_fields:
    - carrier.source.ip
    - carrier.source.port
    - carrier.destination.port
    - core.source.port
    - core.destination.ip
    - core.destination.port
  
  field_types:
    carrier.source.ip: ipv4_address
    carrier.source.port: udp_port
    carrier.destination.port: udp_port
    core.source.port: udp_port
    core.destination.ip: ipv4_address
    core.destination.port: udp_port
    carrier.rtpengine_ip: ipv4_address
    core.rtpengine_ip: ipv4_address

# Annotations
# --------------------------------------------------
annotations:
  - "Template: RTP Engine 4-Leg Topology"
  - "Legs: 4 (2 per hop, bidirectional)"
  - "Topology: Carrier ←→ RTP Engine ←→ Core"
  - "Media: RTP Engine media proxy"
  - "Detection: SDP c= line changes"

# Notes
# --------------------------------------------------
notes: |
  RTP Engine filter template for 4-leg topology (3-hop).
  
  Topology:
  - Phase 1: Carrier ←→ RTP Engine (legs 1, 2)
  - Phase 2: RTP Engine ←→ Core (legs 3, 4)
  
  RTP Engine Detection:
  - Detects SDP c= line changes between INVITEs
  - Identifies RTP Engine IP from modified SDP
  - Creates 2 RTP bridges (4 legs total)
  
  Filter Generation:
  - Step 1: Captures Carrier → RTP Engine RTP
  - Step 2: Captures RTP Engine → Carrier RTP
  - Step 3: Captures RTP Engine → Core RTP
  - Step 4: Captures Core → RTP Engine RTP
  
  Phase Handling:
  - Phase 1: Before XCC cross-connect (initial endpoints)
  - Phase 2: After XCC cross-connect (final endpoints with RTP Engine)
  
  Direction Handling:
  - Inbound: Carrier initiates, Core receives
  - Outbound: Core initiates, Carrier receives
  - Templates adjust filter logic based on direction
  
  Use Cases:
  - PSTN carrier with transcoding
  - SRTP encryption/decryption
  - Codec translation
  - B2BUA with media proxy
