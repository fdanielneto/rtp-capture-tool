name: inbound_with_rtp_engine-fallback
description: Inbound calls with RTP Engine detected (Carrier → RTP Engine → Core)
priority: 5
enabled: false

detection:
  direction: inbound
  # RTP Engine detection: SDP c= IP changes between INVITEs
  # This is detected at runtime by analyzing SDP changes

correlation:
  strategy: generic
  force_direction: inbound
  annotations:
    - "Correlator: GenericCorrelator (Inbound with RTP Engine)"
    - "Scenario: Carrier → RTP Engine → Core"
  
  # Runtime behavior configuration
  config:
    # IP extraction for inbound calls
    carrier_ip_source: first_invite.src_ip  # Carrier is source of first INVITE
    core_ip_source: last_invite.dst_ip      # Core is destination of last INVITE
    
    # Response finding strategy
    response_priority: [183, 200]  # Prefer 183 Session Progress over 200 OK
    enable_hop_fallback: true
    enable_adjacent_packet_search: true
    block_xcc_responses: true
    
    # RTP Engine detection (mandatory for this case)
    rtp_engine_detection: enabled
    xcc_ip_source: invite_with_changed_sdp.src_ip
    
    # Special handling
    filter_reinvites: true
    group_multi_call_ids: true
  
  notes: |
    Use Case: Inbound calls where RTP Engine is detected.
    
    Call Flow:
    - Carrier sends initial INVITE with original media IP
    - SIP message reaches RTP Engine (XCC/B2BUA)
    - RTP Engine modifies SDP c= line to announce its own IP
    - Modified INVITE reaches Core
    
    Detection:
    - SDP c= IP changes between first INVITE and subsequent INVITEs
    - XCC IP identified as source of INVITE with changed SDP
    
    Media Endpoints:
    - Carrier leg: from first INVITE and its 183/200 OK response
    - Core leg: from last INVITE (to Core) and its 183/200 OK response
    
    Priority: 45 (checked after specific carriers but before generic inbound)

# Filter configuration
filters:
  # Use built-in RTP Engine topology templates
  template_set: rtp_engine_topology
  use_default_templates: true
  
  # Custom templates disabled (using built-in)
  custom_templates:
    enabled: false
