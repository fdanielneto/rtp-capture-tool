name: test_configurable_inbound
description: Test case using ConfigurableCorrelator with custom IP extraction
priority: 5
enabled: true  # Enable for testing

detection:
  direction: inbound

correlation:
  strategy: configurable  # Use ConfigurableCorrelator
  force_direction: inbound
  annotations:
    - "Correlator: ConfigurableCorrelator (Test)"
    - "Features: Custom IP extraction + Response priority"
  
  # Runtime behavior configuration (REQUIRED for configurable strategy)
  config:
    # IP extraction rules
    carrier_ip_source: first_invite.src_ip  # Carrier is source of first INVITE
    core_ip_source: last_invite.dst_ip      # Core is destination of last INVITE
    
    # Response finding strategy
    response_priority: [183, 200]  # Try 183 Session Progress first
    enable_hop_fallback: true
    enable_adjacent_packet_search: true
    block_xcc_responses: true
    
    # RTP Engine detection
    rtp_engine_detection: enabled
    xcc_ip_source: invite_with_changed_sdp.src_ip
    
    # Special handling
    filter_reinvites: true
    group_multi_call_ids: true
  
  notes: |
    Test case demonstrating ConfigurableCorrelator functionality.
    
    This case uses custom IP extraction logic defined in YAML
    instead of hardcoded logic in build_correlation_context().
    
    Features tested:
    - Custom carrier_ip_source (first_invite.src_ip)
    - Custom core_ip_source (last_invite.dst_ip)
    - Response priority: 183 > 200
    - RTP Engine detection enabled
    - Filter re-INVITEs enabled
    
    Expected behavior:
    - Carrier IP extracted from first INVITE source
    - Core IP extracted from last INVITE destination
    - Uses 183 Session Progress if available, falls back to 200 OK
    - Detects RTP Engine by SDP c= changes
    - Filters out re-INVITEs (messages with to_tag)

# No filters config - will use defaults
