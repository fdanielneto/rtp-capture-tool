# Inbound B2BUA with Multi Call-ID (New Modular Architecture)
# ==================================================
# Inbound calls with B2BUA creating multiple Call-IDs
#
# Topology: Carrier ←→ RTP Engine ←→ Core
# Strategy: rtp_engine_topology (3-hop)
# Template: rtp_engine_4legs (4 filters)
# Multi Call-ID: Enabled with X-Talkdesk-Other-Leg-Call-Id
# ==================================================

name: inbound_b2bua_v2
description: "Inbound calls with B2BUA (multiple Call-IDs)"
priority: 5
enabled: true

# Detection Rules
# --------------------------------------------------
# Define WHEN this use case applies
detection:
  direction: inbound
  rules:
    - type: direction_match
      direction: inbound
      description: "Inbound call detection"
    
    - type: header_present
      header: X-Talkdesk-Other-Leg-Call-Id
      required: true
      description: "B2BUA header present (multi Call-ID scenario)"

# Correlation Configuration
# --------------------------------------------------
# NEW: Use modular strategy from YAML file
correlation:
  strategy: rtp_engine_topology  # ← References correlation_strategies/rtp_engine_topology.yaml
  force_direction: inbound
  
  # Optional: Override strategy defaults
  overrides: {}
  
  # Multi Call-ID configuration
  multi_call_id: true  # Multiple Call-IDs (B2BUA scenario)
  
  # Annotations
  annotations:
    - "Correlator: ConfigurableCorrelator (Modular Architecture)"
    - "Strategy: rtp_engine_topology (3-hop)"
    - "Features: RTP Engine, Multi Call-ID grouping"
  
  # Notes
  notes: |
    Inbound calls with B2BUA creating multiple Call-IDs.
    
    Call Flow:
    - Phase 1: Carrier → B2BUA (Call-ID #1)
    - Phase 2: B2BUA → Core (Call-ID #2)
    - B2BUA adds X-Talkdesk-Other-Leg-Call-Id header linking Call-IDs
    
    Media Path:
    - Carrier ←→ RTP Engine ←→ Core
    - 4 RTP flows (bidirectional on each leg)
    
    Multi Call-ID Handling:
    - Groups Call-IDs using X-Talkdesk-Other-Leg-Call-Id header
    - Merges SIP messages from both Call-IDs for correlation
    - Creates single unified PCAP with all RTP streams
    
    Use Cases:
    - B2BUA scenarios (Kamailio, Asterisk, FreeSWITCH)
    - SBC with separate Call-IDs per leg
    - Vendor-specific B2BUA implementations

# Filter Configuration
# --------------------------------------------------
# NEW: Use modular template from YAML file
filters:
  template: rtp_engine_4legs  # ← References filter_templates/rtp_engine_4legs.yaml
  use_default_templates: false  # Use YAML template instead
  custom_templates_enabled: false
  
  notes: |
    Uses filter template "rtp_engine_4legs" from YAML file.
    
    Generated filters:
    - Step 1 (Phase 1): Carrier → RTP Engine
    - Step 2 (Phase 1): RTP Engine → Carrier
    - Step 3 (Phase 2): RTP Engine → Core
    - Step 4 (Phase 2): Core → RTP Engine

# Metadata
# --------------------------------------------------
metadata:
  version: "2.0.0"
  architecture: "modular"
  created: "2026-03-05"
  migrated_from: "inbound_2cid"
