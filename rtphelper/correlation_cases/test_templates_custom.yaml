# Test case for custom filter templates
name: test_templates_custom
description: "Test case demonstrating custom filter templates with conditionals"
priority: 5
enabled: true

detection:
  rules:
    - type: call_id_pattern
      pattern: "test-custom"
      description: "Test case identifier"

correlation:
  strategy: configurable
  
  config:
    carrier_ip_source: first_invite.src_ip
    core_ip_source: last_invite.dst_ip
    response_priority: [183, 200]
    rtp_engine_detection: optional
    filter_reinvites: true
  
  notes: |
    Test case demonstrating custom filter templates with conditionals.

# Custom filter templates
filters:
  template_set: null  # Not using built-in
  use_default_templates: false
  custom_templates_enabled: true
  
  steps:
    - step: 1
      leg_name: "carrier->host"
      leg_key: "leg_carrier_rtpengine"
      description: "Custom carrier inbound/outbound filter"
      required_fields:
        - carrier.source.ip
        - carrier.source.port
      phase1_template: |
        {% if direction == "inbound" %}ip.src==${carrier.source.ip} && udp.srcport==${carrier.source.port}{% endif %}{% if direction == "outbound" %}ip.dst==${carrier.destination.ip} && udp.srcport==${carrier.source.port}{% endif %}
      phase2_template: |
        {% if direction == "inbound" %}ip.src==${carrier.source.ip} && udp.srcport==${carrier.source.port}{% else %}ip.src==${carrier.destination.ip} && udp.srcport==${carrier.destination.port}{% endif %}
    
    - step: 2
      leg_name: "host->carrier"
      leg_key: "leg_rtpengine_carrier"
      description: "Custom RTP Engine to carrier filter with RTP Engine detection"
      required_fields:
        - carrier.destination.port
      phase1_template: |
        {% if direction == "outbound" %}udp.srcport==${carrier.destination.port} && ip.src==${carrier.destination.ip}{% else %}udp.srcport==${carrier.destination.port} && ip.dst==${carrier.source.ip}{% endif %}
      phase2_template: |
        {% if rtpengine.detected %}{% if direction == "outbound" %}ip.src==${carrier.rtpengine_ip} && udp.srcport==${carrier.source.port}{% else %}ip.src==${carrier.rtpengine_ip} && udp.srcport==${carrier.destination.port}{% endif %}{% else %}ip.src==${carrier.destination.ip} && udp.srcport==${carrier.destination.port}{% endif %}
    
    - step: 3
      leg_name: "host->core"
      leg_key: "leg_rtpengine_core"
      description: "RTP Engine to core with conditional logic"
      required_fields:
        - core.source.port
      phase1_template: |
        {% if direction == "outbound" %}udp.srcport==${core.source.port} && ip.src==${core.source.ip}{% else %}udp.srcport==${core.source.port} && ip.dst==${core.destination.ip}{% endif %}
      phase2_template: |
        {% if rtpengine.detected %}{% if direction == "outbound" %}ip.src==${core.rtpengine_ip} && udp.srcport==${core.destination.port}{% else %}ip.src==${core.rtpengine_ip} && udp.srcport==${core.source.port}{% endif %}{% else %}ip.src==${core.destination.ip} && udp.srcport==${core.destination.port}{% endif %}
    
    - step: 4
      leg_name: "core->host"
      leg_key: "leg_core_rtpengine"
      description: "Core to RTP Engine"
      required_fields:
        - core.destination.ip
        - core.destination.port
      phase1_template: |
        {% if direction == "outbound" %}ip.dst==${core.source.ip} && udp.srcport==${core.destination.port}{% else %}ip.src==${core.destination.ip} && udp.srcport==${core.destination.port}{% endif %}
      phase2_template: |
        {% if direction == "outbound" %}ip.src==${core.source.ip} && udp.srcport==${core.source.port}{% else %}ip.src==${core.destination.ip} && udp.srcport==${core.destination.port}{% endif %}

notes: |
  ## Custom Filter Templates
  
  This case demonstrates custom filter templates with:
  - Conditional logic based on direction (inbound/outbound)
  - Conditional logic based on RTP Engine detection
  - Variable substitution for all media endpoints
  
  ### Template Syntax:
  - Variables: ${carrier.source.ip}
  - Conditionals: {% if direction == "inbound" %}...{% endif %}
  - Conditionals with else: {% if rtpengine.detected %}...{% else %}...{% endif %}
  
  ### Required Fields:
  Each step specifies required_fields that must be present for the filter to be available.
  If any required field is missing, the filter step is marked as unavailable.
