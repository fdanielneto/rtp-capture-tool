# Outbound RTP Engine (New Modular Architecture)
# ==================================================
# Outbound calls with RTP Engine media proxy (3-hop topology)
#
# Topology: Core ←→ RTP Engine ←→ Carrier
# Strategy: rtp_engine_topology (3-hop)
# Template: rtp_engine_4legs (4 filters)
# ==================================================

name: outbound_rtp_engine_v2
description: "Outbound calls with RTP Engine media proxy"
priority: 80
enabled: true

# Detection Rules
# --------------------------------------------------
# Define WHEN this use case applies
detection:
  direction: outbound
  rules:
    - type: direction_match
      direction: outbound
      description: "Outbound call detection"

# Correlation Configuration
# --------------------------------------------------
# NEW: Use modular strategy from YAML file
correlation:
  strategy: rtp_engine_topology  # ← References correlation_strategies/rtp_engine_topology.yaml
  force_direction: outbound
  
  # Optional: Override strategy defaults
  overrides: {}
  
  # Multi Call-ID configuration
  multi_call_id: false  # Single Call-ID only
  
  # Annotations
  annotations:
    - "Correlator: ConfigurableCorrelator (Modular Architecture)"
    - "Strategy: rtp_engine_topology (3-hop)"
    - "Features: RTP Engine detection, Single Call-ID"
  
  # Notes
  notes: |
    Outbound calls with RTP Engine in media path (4-leg topology).
    
    Call Flow:
    - Phase 1: Core → RTP Engine (INVITE, core RTP endpoints)
    - Phase 2: RTP Engine → Carrier (re-INVITE, RTP Engine endpoints)
    
    Media Path:
    - Core ←→ RTP Engine ←→ Carrier
    - 4 RTP flows (bidirectional on each leg)
    
    RTP Engine Detection:
    - Detects SDP c= line changes between INVITEs
    - Identifies RTP Engine IP from modified SDP
    
    Use Cases:
    - Outbound to PSTN with transcoding
    - Outbound with SRTP encryption/decryption
    - Codec translation for carrier compatibility

# Filter Configuration
# --------------------------------------------------
# NEW: Use modular template from YAML file
filters:
  template: rtp_engine_4legs  # ← References filter_templates/rtp_engine_4legs.yaml
  use_default_templates: false  # Use YAML template instead
  custom_templates_enabled: false
  
  notes: |
    Uses filter template "rtp_engine_4legs" from YAML file.
    
    Generated filters:
    - Step 1 (Phase 1): Core → RTP Engine
    - Step 2 (Phase 1): RTP Engine → Core
    - Step 3 (Phase 2): RTP Engine → Carrier
    - Step 4 (Phase 2): Carrier → RTP Engine

# Metadata
# --------------------------------------------------
metadata:
  version: "2.0.0"
  architecture: "modular"
  created: "2026-03-05"
  migrated_from: "outbound_xcc"
