name: response_hop_fallback-fallback
description: Fallback to find response at previous/next hop when direct response not found
priority: 5
enabled: false

detection:
  direction: both
  # Handles cases where direct response to INVITE not found
  # Falls back to finding response received by adjacent hop

correlation:
  strategy: generic
  annotations:
    - "Correlator: GenericCorrelator (Response Hop Fallback)"
    - "Feature: Multi-hop response discovery"
  
  notes: |
    Use Case: Response not found directly, search at adjacent hops.
    
    Problem Scenarios:
    - Partial PCAP capture (missing some hops)
    - Asymmetric routing (request/response take different paths)
    - B2BUA forwarding delay causing response mismatch
    - CSeq/Via-branch mismatch in complex scenarios
    
    Fallback Strategy (per direction):
    
    INBOUND:
    1. Carrier response: Look at first hop (first_invite.dst_ip)
    2. Core response: Look at previous hop (last_invite.src_ip)
    
    OUTBOUND:
    1. Core response: Look at next hop (first_invite.dst_ip)
    2. Carrier response: Look at previous hop (last_invite.src_ip)
    
    Function: _find_response_to_hop()
    - Finds INVITEs sent BY the hop (propagated INVITEs)
    - Finds responses TO those propagated INVITEs
    - Returns response received BY the hop (dst_ip = hop_ip)
    
    XCC IP Blocking:
    - If hop_ip equals xcc_ip (B2BUA server), fallback is BLOCKED
    - Prevents using responses at the B2BUA server itself
    - Avoids incorrect media endpoint extraction from intermediate hop
    
    Validation:
    - Only considers INVITEs after reference timestamp
    - Prioritizes 183 Session Progress over 200 OK
    - Maintains same response priority as direct match
    
    Priority: 30 (lower priority, used as fallback mechanism)
    
    Implementation:
    - Function: _find_response_to_hop()
    - Location: sip_correlation.py lines ~707-752
    - Called from: build_correlation_context() at multiple points
    
    Log Messages:
    - "INFO: Carrier/Core 183/200 OK not found, using response to/from hop"
    - "WARN: Fallback blocked - hop IP is XCC IP"
