# Inbound calls with RTP Engine (XCC cross-connect)
name: inbound_xcc
description: "Inbound calls with RTP Engine media proxy (XCC cross-connect)"
priority: 5
enabled: false

detection:
  direction: inbound
  rules:
    - type: direction_match
      direction: inbound
      description: "Inbound call detection"

correlation:
  strategy: configurable
  force_direction: inbound
  
  config:
    # IP extraction for RTP Engine topology
    carrier_ip_source: first_invite.src_ip
    core_ip_source: last_invite.dst_ip
    
    # Response priority (prefer early media)
    response_priority: [183, 200]
    enable_hop_fallback: true
    enable_adjacent_packet_search: true
    block_xcc_responses: true
    
    # RTP Engine detection ENABLED
    rtp_engine_detection: enabled
    xcc_ip_source: invite_with_changed_sdp.src_ip
    
    # Call-ID grouping DISABLED (single Call-ID)
    group_multi_call_ids: false
    
    # Re-INVITE handling
    filter_reinvites: true
  
  annotations:
    - "Correlator: ConfigurableCorrelator (Inbound with RTP Engine)"
    - "Features: RTP Engine detection, Single Call-ID"
  
  notes: |
    Inbound calls with RTP Engine in media path (4-leg topology).
    
    Call Flow:
    - Phase 1: Carrier → RTP Engine (INVITE, carrier RTP endpoints)
    - Phase 2: RTP Engine → Core (re-INVITE, RTP Engine endpoints)
    
    Media Path:
    - Carrier ↔ RTP Engine ↔ Core
    - 4 RTP flows (bidirectional on each leg)
    
    RTP Engine Detection:
    - Detects SDP c= line changes between INVITEs
    - Identifies RTP Engine IP from modified SDP
    
    Use Cases:
    - PSTN carrier inbound with transcoding
    - Inbound with SRTP encryption/decryption
    - Carrier with codec translation

# Filter configuration using RTP Engine topology template
filters:
  template_set: rtp_engine_topology
  use_default_templates: true
  custom_templates_enabled: false
  
  notes: |
    Uses built-in "rtp_engine_topology" template set for 4-leg calls.
    
    Generated filters:
    - Step 1 (Phase 1): Carrier → RTP Engine
    - Step 2 (Phase 1): RTP Engine → Carrier
    - Step 3 (Phase 2): RTP Engine → Core
    - Step 4 (Phase 2): Core → RTP Engine
