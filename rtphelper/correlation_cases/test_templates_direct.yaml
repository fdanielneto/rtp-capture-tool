# Test case for filter template system - Direct media topology
name: test_templates_direct
description: "Test case demonstrating filter template system with direct media (2-leg topology)"
priority: 100
enabled: true

detection:
  rules:
    - type: call_id_pattern
      pattern: "test-direct"
      description: "Test case identifier"

correlation:
  strategy: configurable
  
  config:
    # Standard IP extraction for direct media scenario
    carrier_ip_source: first_invite.src_ip
    core_ip_source: last_invite.dst_ip
    response_priority: [200]
    rtp_engine_detection: disabled
    filter_reinvites: true
  
  notes: |
    Test case demonstrating filter template system with direct media topology.
    Uses built-in "direct_topology" template set.

# Filter configuration using templates
filters:
  template_set: direct_topology
  use_default_templates: true
  custom_templates_enabled: false
  
  # Built-in template set provides 2-leg topology:
  # Step 1: carrier -> core (direct RTP)
  # Step 2: core -> carrier (direct RTP)

notes: |
  ## Filter Template System - Direct Media
  
  This case uses the built-in "direct_topology" template set for scenarios
  without RTP Engine (direct media path).
  
  ### Template Variables:
  - ${carrier.source.ip}, ${carrier.source.port}
  - ${core.destination.ip}, ${core.destination.port}
  - ${direction} (inbound/outbound)
  
  ### Example Filters:
  Step 1: ip.src==${carrier.source.ip} && udp.srcport==${carrier.source.port}
  Step 2: ip.src==${core.destination.ip} && udp.srcport==${core.destination.port}
