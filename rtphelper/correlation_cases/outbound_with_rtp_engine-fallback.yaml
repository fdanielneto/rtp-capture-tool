name: outbound_with_rtp_engine-fallback
description: Outbound calls with RTP Engine detected (Core → RTP Engine → Carrier)
priority: 44
enabled: true

detection:
  direction: outbound
  # RTP Engine detection: SDP c= IP changes between INVITEs

correlation:
  strategy: generic
  force_direction: outbound
  annotations:
    - "Correlator: GenericCorrelator (Outbound with RTP Engine)"
    - "Scenario: Core → RTP Engine → Carrier"
  
  notes: |
    Use Case: Outbound calls where RTP Engine is detected.
    
    Call Flow:
    - Core sends initial INVITE with original media IP
    - SIP message reaches RTP Engine (XCC/B2BUA)
    - RTP Engine modifies SDP c= line to announce its own IP
    - Modified INVITE reaches Carrier
    
    Detection:
    - SDP c= IP changes between first INVITE and subsequent INVITEs
    - XCC IP identified as source of INVITE with changed SDP
    
    Media Endpoints:
    - Core leg: from first INVITE and its 183/200 OK response
    - Carrier leg: from last INVITE (to Carrier) and its 183/200 OK response
    
    Priority: 44 (checked after specific carriers but before generic outbound)
