name: incomplete_sdp-fallback
description: Calls with incomplete SDP (fallback to adjacent packets)
priority: 5
enabled: false

detection:
  direction: both
  # Handles cases where SIP messages lack complete SDP information
  # Falls back to adjacent packets from same source

correlation:
  strategy: generic
  annotations:
    - "Correlator: GenericCorrelator (Incomplete SDP)"
    - "Feature: Adjacent packet fallback for missing SDP"
  
  notes: |
    Use Case: Calls where SIP messages lack complete SDP information.
    
    Problem Scenarios:
    - INVITE without SDP (offer/answer in 200 OK)
    - 200 OK without SDP (delayed SDP)
    - Fragmented SIP messages across packets
    - Packet capture starting mid-call
    
    Fallback Strategy:
    - When INVITE/response lacks SDP, check adjacent packets
    - Priority: previous packet (-1) first, then next packet (+1)
    - Must be same source IP and message type
    
    Adjacent Packet Functions:
    1. _find_adjacent_invite_with_sdp() - for INVITEs
    2. _find_adjacent_200ok_with_sdp() - for 200 OK
    3. _find_adjacent_response_with_sdp() - for any response (183, 200)
    
    Validation Criteria:
    - Same src_ip as original message
    - Same message type (INVITE or response with same status code)
    - Has valid SDP (has_sdp=true and media_sections present)
    - Valid audio port extracted
    
    Priority: 65 (high priority to handle incomplete captures)
    
    Implementation:
    - Functions: _find_adjacent_*_with_sdp()
    - Location: sip_correlation.py lines ~563-625
