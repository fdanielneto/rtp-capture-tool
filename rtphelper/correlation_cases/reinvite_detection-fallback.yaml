name: reinvite_detection-fallback
description: Calls with re-INVITE (distinguishes from initial INVITE)
priority: 5
enabled: false

detection:
  direction: both
  # Identifies initial INVITEs vs re-INVITEs
  # Initial INVITE: no to_tag in To header
  # Re-INVITE: has to_tag (in-dialog request)

correlation:
  strategy: generic
  annotations:
    - "Correlator: GenericCorrelator (re-INVITE detection)"
    - "Feature: Distinguishes initial INVITE from re-INVITE"
  
  notes: |
    Use Case: Calls with re-INVITEs (session modifications).
    
    Initial INVITE vs re-INVITE:
    - Initial INVITE: To header has NO to_tag
    - re-INVITE: To header HAS to_tag (established dialog)
    
    Common re-INVITE Scenarios:
    - Session hold/resume
    - Codec renegotiation
    - Media IP/port changes
    - Call transfer (REFER + re-INVITE)
    - RTP Engine intervention mid-call
    
    Correlation Strategy:
    - Uses _find_last_initial_invite() to find TRUE destination
    - Ignores re-INVITEs when determining call topology
    - Focuses on initial INVITE for media endpoint extraction
    
    Detection Logic:
    - Check to_tag presence in To header
    - Initial INVITE: to_tag is None or empty
    - re-INVITE: to_tag is populated
    
    Importance:
    - Prevents misidentifying re-INVITE as new call leg
    - Ensures correct carrier/core IP identification
    - Critical for B2BUA scenarios with multiple hops
    
    Priority: 68 (high priority to correctly identify call topology)
    
    Implementation:
    - Function: _find_last_initial_invite()
    - Location: sip_correlation.py lines ~785-807
    
    Note: In multi-Call-ID scenarios, from_tag may change across
    Call-ID boundaries, so to_tag check is more reliable than from_tag.
