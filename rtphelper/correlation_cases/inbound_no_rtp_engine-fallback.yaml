name: inbound_no_rtp_engine-fallback
description: Inbound calls without RTP Engine (direct Carrier → Core)
priority: 5
enabled: false

detection:
  direction: inbound
  # No RTP Engine: SDP c= IP remains constant across INVITEs

correlation:
  strategy: generic
  force_direction: inbound
  annotations:
    - "Correlator: GenericCorrelator (Inbound direct)"
    - "Scenario: Carrier → Core (no RTP Engine)"
  
  # Runtime behavior configuration
  config:
    # IP extraction for inbound direct calls
    carrier_ip_source: first_invite.src_ip
    core_ip_source: last_invite.dst_ip
    
    # Response finding strategy
    response_priority: [183, 200]
    enable_hop_fallback: true
    enable_adjacent_packet_search: true
    block_xcc_responses: false  # No B2BUA in direct topology
    
    # RTP Engine detection (disabled for direct topology)
    rtp_engine_detection: disabled
    
    # Special handling
    filter_reinvites: true
    group_multi_call_ids: true
  
  notes: |
    Use Case: Inbound calls with direct path (no RTP Engine).
    
    Call Flow:
    - Carrier sends INVITE directly to Core
    - No intermediate RTP Engine/media proxy
    - SDP c= line remains unchanged
    
    Detection:
    - SDP c= IP does NOT change across INVITE hops
    - Single-hop scenario (may have B2BUA for signaling only)
    
    Media Endpoints:
    - Carrier leg: from first INVITE and its 183/200 OK
    - Core leg: same IPs as carrier leg (no intermediate media hop)
    
    Priority: 42 (after RTP Engine cases)

# Filter configuration
filters:
  # Use built-in direct topology templates (2-leg only)
  template_set: direct_topology
  use_default_templates: true
  
  custom_templates:
    enabled: false
