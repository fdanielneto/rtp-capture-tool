# Inbound calls with multiple Call-IDs and RTP Engine
name: inbound_2cid
description: "Inbound calls with multiple Call-IDs (B2BUA) and RTP Engine"
priority: 5
enabled: false

detection:
  direction: inbound
  rules:
    - type: direction_match
      direction: inbound
      description: "Inbound call detection"
    - type: header_present
      header: "X-Talkdesk-Other-Leg-Call-Id"
      description: "B2BUA multi Call-ID indicator"
      required: false

correlation:
  strategy: configurable
  force_direction: inbound
  
  config:
    # IP extraction for RTP Engine topology
    carrier_ip_source: first_invite.src_ip
    core_ip_source: last_invite.dst_ip
    
    # Response priority (prefer early media)
    response_priority: [183, 200]
    enable_hop_fallback: true
    enable_adjacent_packet_search: true
    block_xcc_responses: true
    
    # RTP Engine detection ENABLED
    rtp_engine_detection: enabled
    xcc_ip_source: invite_with_changed_sdp.src_ip
    
    # Call-ID grouping ENABLED (multi Call-ID)
    group_multi_call_ids: true
    
    # Re-INVITE handling
    filter_reinvites: true
  
  annotations:
    - "Correlator: ConfigurableCorrelator (Inbound B2BUA with RTP Engine)"
    - "Features: RTP Engine detection, Multi Call-ID grouping"
  
  notes: |
    Inbound calls with B2BUA (multiple Call-IDs) and RTP Engine (4-leg topology).
    
    B2BUA Scenario:
    - Carrier → B2BUA (Call-ID: abc@carrier)
    - B2BUA → Core (Call-ID: xyz@b2bua)
    - X-Talkdesk-Other-Leg-Call-Id links the Call-IDs
    
    Call Flow:
    - Phase 1: Carrier → RTP Engine (first Call-ID)
    - Phase 2: RTP Engine → Core (second Call-ID)
    
    Media Path:
    - Carrier ↔ RTP Engine ↔ Core
    - 4 RTP flows across 2 Call-IDs
    
    Call-ID Grouping:
    - group_related_calls() builds Call-ID graph
    - merge_calls_by_group() combines SIP messages
    - Correlation treats as single logical call
    
    Use Cases:
    - Multi-tenant platforms with B2BUA
    - Call centers with call leg separation
    - Advanced routing with Call-ID transformation

# Filter configuration using RTP Engine topology template
filters:
  template_set: rtp_engine_topology
  use_default_templates: true
  custom_templates_enabled: false
  
  notes: |
    Uses built-in "rtp_engine_topology" template set for 4-leg calls.
    
    Generated filters capture RTP across both Call-IDs:
    - Step 1 (Phase 1): Carrier → RTP Engine
    - Step 2 (Phase 1): RTP Engine → Carrier
    - Step 3 (Phase 2): RTP Engine → Core
    - Step 4 (Phase 2): Core → RTP Engine
    
    Note: Call-ID grouping merges SIP messages before filter generation,
    so filters correctly capture media endpoints across both legs.
