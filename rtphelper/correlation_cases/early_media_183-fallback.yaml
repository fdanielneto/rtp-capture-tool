name: early_media_183-fallback
description: Calls with 183 Session Progress (Early Media)
priority: 5
enabled: false

detection:
  direction: both
  # Detects calls with 183 Session Progress response
  # 183 is prioritized over 200 OK for media endpoint extraction

correlation:
  strategy: generic
  annotations:
    - "Correlator: GenericCorrelator (Early Media)"
    - "Feature: 183 Session Progress prioritized over 200 OK"
  
  # Configuration for early media handling
  config:
    # Standard IP extraction
    carrier_ip_source: first_invite.src_ip
    core_ip_source: last_invite.dst_ip
    
    # Response priority: 183 first (early media)
    response_priority: [183, 200]
    enable_hop_fallback: true
    enable_adjacent_packet_search: true
    block_xcc_responses: true
    
    # RTP Engine detection
    rtp_engine_detection: optional  # May or may not have RTP Engine
    
    # Special handling
    filter_reinvites: true
    group_multi_call_ids: true
  
  notes: |
    Use Case: Calls with 183 Session Progress (Early Media).
    
    Call Flow:
    - Normal INVITE flow
    - 183 Session Progress sent before final 200 OK
    - 183 contains SDP with early media endpoints
    
    Correlation Behavior:
    - Prioritizes 183 Session Progress over 200 OK for media extraction
    - Uses _find_response_for_invite_with_priority():
      1. First tries to find 183 with SDP
      2. Falls back to 200 OK if no 183 found
    
    Early Media Scenarios:
    - Ringback tones from carrier
    - Announcements before call connects
    - Interactive Voice Response (IVR) systems
    
    Media Endpoints:
    - Uses SDP from 183 Session Progress when available
    - Falls back to 200 OK SDP if 183 not present
    
    Priority: 70 (high priority to catch early media scenarios early)
    
    Implementation:
    - Function: _find_response_for_invite_with_priority()
    - Location: sip_correlation.py lines ~680-695
