name: xcc_fallback_blocked-fallback
description: XCC/B2BUA IP blocking for response fallback
priority: 5
enabled: true

detection:
  direction: both
  # Prevents using responses from B2BUA server itself
  # XCC IP = X-Talkdesk-Other-Leg-Call-Id source (B2BUA server)

correlation:
  strategy: generic
  annotations:
    - "Correlator: GenericCorrelator (XCC Fallback Blocker)"
    - "Feature: Prevents incorrect media extraction from B2BUA"
  
  notes: |
    Use Case: Prevent using responses from B2BUA server itself.
    
    Problem:
    - B2BUA server terminates and originates calls separately
    - Each leg has different media endpoints
    - Response at B2BUA could be from EITHER leg
    - Using B2BUA response could give wrong media IP/port
    
    Solution:
    - Identify XCC IP (B2BUA server IP) from RTP Engine detection
    - Block fallback when hop IP equals XCC IP
    - Force correlation to find response from actual endpoints
    
    XCC IP Identification:
    - Detected during RTP Engine analysis
    - Source IP of INVITE where SDP c= changes
    - Stored in ctx.rtp_engine.xcc_ip
    
    Blocking Mechanism:
    - _find_response_to_hop() checks: if hop_ip == xcc_ip: return None
    - Prevents looking for responses at the B2BUA server
    - Applies to both carrier and core leg fallback
    
    Scenarios Blocked:
    1. Inbound: first hop = XCC IP (carrier response fallback blocked)
    2. Inbound: previous hop = XCC IP (core response fallback blocked)
    3. Outbound: next hop = XCC IP (core response fallback blocked)
    4. Outbound: previous hop = XCC IP (carrier response fallback blocked)
    
    Log Messages:
    - "WARN: Carrier/Core 183/200 OK fallback blocked - hop is XCC IP"
    
    Impact:
    - May result in missing media endpoint if no other response found
    - Preferred over incorrect media endpoint from B2BUA
    - Ensures media IPs are from actual carrier/core, not B2BUA
    
    Priority: 80 (very high priority - applies before other fallbacks)
    
    Implementation:
    - Check in: _find_response_to_hop()
    - Location: sip_correlation.py lines ~722-724
    - Used in: build_correlation_context() for all response fallbacks
