# Direct Topology Correlation Strategy (2-Hop)
# ==================================================
# For calls with direct media path between carrier and core-side RTP Engine
# XCC may be absent (no SDP IP rewrite), but RTP Engine remains present.
#
# Topology:
#   Carrier ←→ Core/RTP Engine (direct RTP/SRTP)
#
# Use cases:
#   - WebRTC direct media
#   - Carrier direct routing
#   - Test environments without media proxy
# ==================================================

name: direct_topology
description: "Direct media path correlation (2-hop topology)"
version: "1.0.0"
topology_type: direct_media
hops: 2

# IP Extraction Configuration
# --------------------------------------------------
# Defines HOW to extract carrier and core IPs from SIP messages
ip_extraction:
  carrier:
    source: first_invite.src_ip
    description: "Carrier IP from first INVITE source"
    auto_detect_direction: true
    
  core:
    source: last_invite.dst_ip
    description: "Core IP from last INVITE destination"
    auto_detect_direction: true

# Response Finding Configuration
# --------------------------------------------------
# Defines HOW to find SIP responses for media extraction
response_finding:
  response_priority: [183, 200]
  enable_hop_fallback: true
  enable_adjacent_packet_search: true
  description: |
    Response priority:
    - 183: Session Progress (early media, preferred)
    - 200: OK (answer, fallback)
    
    Fallback logic:
    1. Try to find 183 response
    2. If not found, try 200 response
    3. Enable adjacent packet search for better matching

# Media Extraction Configuration
# --------------------------------------------------
# Defines HOW to extract RTP endpoints from SDP
media_extraction:
  mode: sdp_from_responses
  extract_from:
    - message_type: response
      response_codes: [183, 200]
      extract: [carrier_rtp, core_rtp]
  
  description: |
    Extract RTP endpoints from SIP responses:
    - Carrier RTP: From response to carrier (carrier's media endpoint)
    - Core RTP: From response to core (core's media endpoint)

# Topology Configuration
# --------------------------------------------------
# Defines the call topology structure
topology:
  legs: 2
  description: "2-leg direct media"
  
  phases:
    - phase: 1
      name: "Direct Media"
      description: "Carrier ←→ Core (bidirectional RTP)"
      legs:
        - leg: 1
          name: "Carrier → Core"
          direction: carrier_to_core
          
        - leg: 2
          name: "Core → Carrier"
          direction: core_to_carrier

# RTP Engine / Media Proxy Configuration
# --------------------------------------------------
# XCC rewrite detection disabled for direct topology.
# RTP Engine still exists as media endpoint in Core side.
rtp_engine_detection:
  enabled: false
  description: "XCC rewrite detection disabled (direct topology)"

# Re-INVITE Handling
# --------------------------------------------------
reinvite_filtering:
  enabled: true
  description: "Filter Re-INVITEs to avoid duplicate correlation"

# Validation Rules
# --------------------------------------------------
# Defines validation rules for this strategy
validation:
  required_ips:
    - carrier
    - core
  
  required_rtp_endpoints:
    - carrier_rtp
    - core_rtp
  
  minimum_packets: 10
  description: "At least carrier IP, core IP, and their RTP endpoints required"

# Overridable Fields
# --------------------------------------------------
# These fields can be overridden in use cases
overridable:
  - response_priority
  - enable_hop_fallback
  - enable_adjacent_packet_search
  - reinvite_filtering.enabled
  - validation.minimum_packets

# Backward Compatibility
# --------------------------------------------------
# Legacy field mappings for backward compatibility
legacy_mapping:
  carrier_ip_source: ip_extraction.carrier.source
  core_ip_source: ip_extraction.core.source
  response_priority: response_finding.response_priority
  enable_hop_fallback: response_finding.enable_hop_fallback
  enable_adjacent_packet_search: response_finding.enable_adjacent_packet_search
  filter_reinvites: reinvite_filtering.enabled
  rtp_engine_detection: rtp_engine_detection.enabled

# Annotations
# --------------------------------------------------
annotations:
  - "Strategy: Direct Topology (2-hop)"
  - "Topology: Carrier ←→ Core/RTP Engine"
  - "Media: Direct RTP/SRTP"
  - "Legs: 2 (bidirectional)"

# Notes
# --------------------------------------------------
notes: |
  Direct topology strategy for calls where media flows directly between
  carrier and the core-side RTP Engine endpoint.
  
  Call Flow:
  1. Carrier sends INVITE to Core
  2. Core responds (183/200) with SDP
  3. RTP flows directly: Carrier ←→ Core/RTP Engine
  
  Media Path:
  - Carrier sends RTP to Core/RTP Engine public SDP IP
  - Core/RTP Engine sends RTP to Carrier
  - XCC SDP rewrite may be absent
  
  Use this strategy when:
  - RTP Engine is the core-side media endpoint
  - XCC SDP rewrite is not required
  - Direct media between carrier and core-side endpoint
  - WebRTC direct media
  - Test/dev environments
