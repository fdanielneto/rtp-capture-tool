# Single Call-ID Topology Correlation Strategy (2-Hop)
# ==============================================================
# For inbound calls with single Call-ID where RTP Engine is media termination
#
# Topology:
#   Carrier ←→ RTP Engine (bidirectional RTP)
#
# ** IMPORTANT NOTE **
# In this topology, the RTP Engine IS the media termination point.
# What was historically called "Core" is actually the RTP Engine.
#
# IP Resolution:
# - Carrier IP: Extracted from SIP (first INVITE source)
# - RTP Engine IP: Resolved via DNS from hosts.yaml (private IP)
#
# Use cases:
#   - PSTN carrier inbound without XCC
#   - Direct carrier routing to RTP Engine
#   - Single-leg inbound calls
# ==============================================================

name: inbound_single_cid
description: "Single Call-ID topology - RTP Engine as media termination"
version: "1.0.0"
topology_type: single_callid
hops: 2

# IP Extraction Configuration
# --------------------------------------------------
# Defines HOW to extract carrier and RTP Engine IPs from SIP messages
ip_extraction:
  carrier:
    source: first_invite.src_ip
    description: "Carrier IP from first INVITE source"
    
  # In single Call-ID topology, "rtpengine" is the media termination point
  # The private IP is resolved via DNS from hosts.yaml
  rtpengine:
    source: target_host.resolved_ip
    description: "RTP Engine private IP resolved from hosts.yaml via DNS"
    fallback: last_invite.dst_ip
    notes: |
      Primary: Resolve the target host address from hosts.yaml via DNS
               to get the private/internal IP of the RTP Engine.
      Fallback: If DNS resolution fails, use the destination IP from
                the last INVITE (SDP-announced IP).


# Response Finding Configuration
# --------------------------------------------------
# Defines HOW to find SIP responses for media extraction
response_finding:
  response_priority: [183, 200]
  enable_hop_fallback: false
  enable_adjacent_packet_search: true
  description: |
    Response priority:
    - 183: Session Progress (early media, preferred)
    - 200: OK (answer, fallback)
    
    Fallback logic:
    1. Try to find 183 response
    2. If not found, try 200 response
    3. Enable adjacent packet search for better matching


# Media Extraction Configuration
# --------------------------------------------------
# Defines HOW to extract RTP endpoints from SDP
media_extraction:
  mode: sdp_from_responses
  extract_from:
    - message_type: response
      response_codes: [183, 200]
      extract: [carrier_rtp, rtpengine_rtp]
  
  description: |
    Extract RTP endpoints from SIP responses:
    - Carrier RTP: From response to carrier (carrier's media endpoint)
    - RTP Engine RTP: Resolved via DNS (private IP of RTP Engine)


# Topology Configuration
# --------------------------------------------------
# Defines the call topology structure
topology:
  legs: 2
  description: "2-leg single Call-ID - Carrier ←→ RTP Engine"
  
  phases:
    - phase: 1
      name: "Carrier to RTP Engine"
      description: "Carrier ←→ RTP Engine (bidirectional RTP)"
      legs:
        - leg: 1
          name: "Carrier → RTP Engine"
          direction: carrier_to_rtpengine
          
        - leg: 2
          name: "RTP Engine → Carrier"
          direction: rtpengine_to_carrier

  notes: |
    In single Call-ID topology:
    - Carrier sends media directly to RTP Engine
    - RTP Engine sends media directly back to Carrier
    - No intermediate B2BUA or media proxy
    - RTP Engine IS the media termination (not "Core")


# RTP Engine / Media Proxy Configuration
# --------------------------------------------------
# Configuration for RTP Engine IP resolution
rtp_engine_detection:
  enabled: false  # No XCC detection needed - RTP Engine IS the termination
  use_resolved_ip: true
  description: |
    RTP Engine detection is disabled because the RTP Engine IS the
    media termination point in this topology.
    
    However, the RTP Engine's private IP is resolved via DNS from
    the hosts.yaml configuration to ensure accurate filter generation.


# Re-INVITE Handling
# --------------------------------------------------
reinvite_filtering:
  enabled: true
  description: "Filter Re-INVITEs to avoid duplicate correlation"


# Validation Rules
# --------------------------------------------------
validation:
  pre_extraction:
    - rule: require_invite
      description: "Must have at least one INVITE"
    - rule: require_response
      codes: [183, 200]
      optional: true
      description: "Should have 183 or 200 response (optional)"
  
  post_extraction:
    - rule: require_carrier_ip
      description: "Must have carrier IP from SIP"
    - rule: validate_ports
      description: "Validate extracted RTP ports are valid"
  
  notes: |
    Validation ensures:
    1. INVITE exists for IP extraction
    2. Response exists for media extraction (optional)
    3. Carrier IP is valid
    4. RTP ports are within valid range


# Filter Rendering Configuration
# --------------------------------------------------
filter_rendering:
  template: inbound_single_cid
  variables:
    carrier: carrier
    rtpengine: resolved_rtpengine_ip
  
  notes: |
    Filter variables:
    - carrier.*: From SIP extraction (carrier's RTP endpoint)
    - rtpengine.*: From DNS resolution (RTP Engine's private IP)
    
    The RTP Engine IP in filters is the resolved private IP,
    NOT the SDP-announced IP (which may be a public NAT IP).
